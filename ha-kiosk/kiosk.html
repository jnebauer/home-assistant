<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=1280,initial-scale=1"/>
<title>Home</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
/* ============ RESET + BASE ============ */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body,#app{width:1280px;height:800px;overflow:hidden;background:#0a1330;
  font-family:'Manrope',sans-serif;color:#f3f6ff;-webkit-font-smoothing:antialiased}
button{font-family:inherit;cursor:pointer}
button:disabled{cursor:not-allowed}

/* ============ CSS VARIABLES ============ */
:root{
  --bg-grad:linear-gradient(158deg,#0f1c40 0%,#0a1330 55%,#0b1733 100%);
  --tp:#f3f6ff; --tm:#9fb0d8; --td:#8ea0cc; --ts:#cdd6ee;
  --glass:rgba(255,255,255,.06); --gb:rgba(255,255,255,.11);
  --cyan:#38e0ff; --teal:#2dd4bf; --teal2:#5eead4;
  --amber:#ffae3d; --amber2:#ffc878;
  --red:#ff5d6c; --red2:#ff9aa5;
  --indigo:#7c83ff; --indigoDk:#5b62d6;
  --sky:#7fc4ff;
  --nav-h:52px;
}

/* ============ LAYOUT ============ */
#app{position:relative;background:var(--bg-grad)}
#app::before{content:'';position:absolute;inset:0;pointer-events:none;z-index:0;
  background:
    radial-gradient(ellipse 560px 320px at 20% 10%,rgba(56,118,222,.35) 0%,transparent 70%),
    radial-gradient(ellipse 400px 280px at 80% 80%,rgba(34,176,140,.28) 0%,transparent 70%),
    radial-gradient(ellipse 300px 200px at 65% 5%,rgba(96,66,200,.30) 0%,transparent 70%)}
#content{position:absolute;top:0;left:0;right:0;bottom:var(--nav-h);
  padding:13px 15px 10px;z-index:1;display:flex;flex-direction:column}
#nav{position:absolute;bottom:0;left:0;right:0;height:var(--nav-h);
  background:rgba(8,14,32,.82);backdrop-filter:blur(24px);
  border-top:1px solid rgba(255,255,255,.09);
  display:flex;align-items:stretch;z-index:10}

/* ============ NAV TABS ============ */
.nav-tab{flex:1;display:flex;flex-direction:row;align-items:center;justify-content:center;
  gap:8px;background:none;border:none;color:var(--td);
  font-size:14px;font-weight:700;letter-spacing:.3px;
  position:relative;transition:color .2s;padding:0}
.nav-tab svg{width:20px;height:20px;stroke-width:1.7;fill:none;stroke:currentColor}
.nav-tab.active{color:var(--cyan)}
.nav-tab.active::before{content:'';position:absolute;top:0;left:20%;right:20%;
  height:3px;background:var(--cyan);border-radius:0 0 3px 3px}

/* ============ GLASS ============ */
.glass{background:var(--glass);border:1px solid var(--gb);
  backdrop-filter:blur(22px);box-shadow:inset 0 1px 0 rgba(255,255,255,.08)}

/* ============ ANIMATIONS ============ */
@keyframes livePulse{0%,100%{opacity:1}50%{opacity:.3}}
@keyframes glowAmber{0%,100%{box-shadow:0 0 7px rgba(255,174,61,.5)}50%{box-shadow:0 0 18px rgba(255,174,61,.9)}}
@keyframes flowDash{0%{stroke-dashoffset:24}100%{stroke-dashoffset:0}}
@keyframes spin{to{transform:rotate(360deg)}}

/* ============ SHARED ============ */
.label-caps{font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--tm)}
.pill-switch{width:44px;height:25px;border-radius:99px;position:relative;
  border:none;transition:background .2s;flex-shrink:0;padding:0;display:inline-block}
.pill-switch.on{background:var(--teal)}
.pill-switch.off{background:rgba(255,255,255,.15)}
.pill-switch::after{content:'';position:absolute;top:3px;width:19px;height:19px;
  border-radius:50%;background:#fff;transition:left .2s}
.pill-switch.on::after{left:22px}
.pill-switch.off::after{left:3px}

/* ============ LOADING ============ */
#loading{display:flex;align-items:center;justify-content:center;gap:8px;height:100%;
  font-size:14px;color:var(--tm)}
.ldot{width:8px;height:8px;border-radius:50%;background:var(--cyan);
  animation:livePulse 1.2s ease-in-out infinite}
.ldot:nth-child(2){animation-delay:.2s}
.ldot:nth-child(3){animation-delay:.4s}

/* ============ HOME TAB ============ */
.home-header{display:flex;align-items:stretch;justify-content:space-between;gap:10px;flex-shrink:0}
.clock-block{display:flex;flex-direction:column;justify-content:center;gap:2px;min-width:0}
.clock-time{font-family:'Space Grotesk',sans-serif;font-size:54px;font-weight:600;
  line-height:1;letter-spacing:-1px;color:var(--tp)}
.clock-ampm{font-size:16px;font-weight:600;color:var(--tm);padding-bottom:6px}
.clock-sec{font-size:12px;color:var(--td)}
.clock-date{font-size:13px;color:var(--tm);letter-spacing:.3px;margin-top:2px}
.header-cluster{display:flex;gap:9px;align-items:stretch}

/* Security mini card (combined alarm + motion) */
.security-mini{padding:10px 13px;border-radius:16px;display:flex;flex-direction:column;gap:7px;justify-content:center;cursor:pointer;min-width:160px}
.sec-mini-divider{height:1px;background:rgba(255,255,255,.09)}
.pir-row{display:flex;align-items:center;gap:6px}
.pir-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;transition:background .3s}
.pir-dot.active{background:var(--amber);animation:glowAmber 1.4s ease-in-out infinite}
.pir-dot.clear{background:var(--teal);box-shadow:0 0 6px rgba(45,212,191,.5)}
.pir-label{font-size:11px;font-weight:600}
.pir-label.active{color:var(--amber2)}
.pir-label.clear{color:var(--ts)}

/* Alarm status */
.alarm-status{font-size:12px;font-weight:600}
.alarm-status.armed{color:var(--teal)}
.alarm-status.disarmed{color:var(--td)}

/* Weather card (wide, single row) */
.weather-card{padding:14px 20px;border-radius:16px;display:flex;align-items:center;gap:16px;flex:1;min-width:0}
.wx-current{display:flex;align-items:center;gap:12px;flex-shrink:0}
.wx-ico svg{height:38px;width:auto}
.wx-current-text{display:flex;flex-direction:column;gap:1px}
.weather-temp{font-family:'Space Grotesk',sans-serif;font-size:38px;font-weight:700;color:#f3f6ff;line-height:1}
.weather-cond{font-size:11px;color:#9fb0d8;line-height:1.35}
.wx-divider{width:1px;height:46px;background:rgba(255,255,255,.1);flex-shrink:0}
.wx-forecast{display:flex;gap:8px;flex:1;min-width:0}
.wx-day{display:flex;align-items:center;justify-content:space-between;gap:6px;padding:10px 12px;border-radius:11px;flex:1;min-width:0}
.wx-day.today{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.1)}
.wx-day.other{background:rgba(255,255,255,.04);border:1px solid transparent}
.wx-day-name{font-size:12px;font-weight:700;color:#f3f6ff;flex-shrink:0}
.wx-ico-sm svg{height:22px;width:auto}
.wx-day-temps{font-size:13px;font-weight:600;flex-shrink:0}
.wx-sun{display:flex;flex-direction:column;gap:7px;flex-shrink:0}
.wx-sun-row{display:flex;align-items:center;gap:6px}
.wx-sun-label{font-size:10px;color:#9fb0d8}
.wx-sun-time{font-size:13px;font-weight:700;margin-left:2px}

/* Body row */
.home-body{display:flex;gap:10px;flex:1;min-height:0;margin-top:9px}

/* Climate panel */
.climate-panel{flex:1.9;padding:11px 13px;display:flex;flex-direction:column;gap:8px;min-height:0;border-radius:18px}
.climate-header{display:flex;align-items:center;justify-content:space-between}
.climate-grid{display:grid;gap:7px;flex:1;min-height:0;overflow-y:auto}
.climate-grid.compact{grid-template-columns:repeat(3,1fr)}
.climate-grid.expanded{grid-template-columns:repeat(4,1fr)}
.zone-tile{border-radius:16px;padding:11px 13px;display:flex;flex-direction:column;gap:9px;transition:all .2s}
.zone-tile.on{background:rgba(56,224,255,.08);border:1.5px solid rgba(56,224,255,.28)}
.zone-tile.off{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.07)}
.zone-header{display:flex;align-items:center;justify-content:space-between}
.zone-name{font-size:17px;font-weight:700}
.zone-name.on{color:#f3f6ff}
.zone-name.off{color:#7080a0}
.zone-pwr{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;padding:0;transition:all .2s}
.zone-pwr.on{background:#2dd4bf;border:none;box-shadow:0 0 18px rgba(45,212,191,.55)}
.zone-pwr.off{background:rgba(255,255,255,.07);border:1.5px solid rgba(255,255,255,.13)}
.zone-controls{display:flex;align-items:center;gap:8px}
.zone-btn{flex:1;height:52px;border-radius:13px;border:1px solid rgba(255,255,255,.13);
  background:rgba(255,255,255,.1);color:#f3f6ff;font-size:30px;font-weight:200;
  display:flex;align-items:center;justify-content:center;line-height:1}
.zone-btn.dim{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.06);color:rgba(255,255,255,.2)}
.zone-set{flex:1.3;text-align:center}
.zone-set-temp{font-family:'Space Grotesk',sans-serif;font-size:36px;font-weight:700;color:#f3f6ff;line-height:1}
.zone-set-temp.off{color:rgba(255,255,255,.22);font-weight:500}
.zone-set-label{font-size:11px;color:#9fb0d8;margin-top:2px}
.zone-strip{background:rgba(0,0,0,.25);border-radius:9px;padding:6px;text-align:center;font-size:13px}
.zone-strip-label{color:#9fb0d8}
.zone-strip-val{color:#38e0ff;font-weight:700}
.zone-strip.off .zone-strip-label{color:#5a6a82}
.zone-strip.off .zone-strip-val{color:#6b7d9e}

/* Right column */
.right-col{flex:1.2;display:flex;flex-direction:column;gap:8px;min-height:0}

/* Camera grid */
.cam-grid{display:grid;grid-template-columns:repeat(2,1fr);grid-template-rows:repeat(2,1fr);gap:6px;flex:1;min-height:0}
.cam-tile{background:repeating-linear-gradient(0deg,rgba(255,255,255,.025) 0 1px,transparent 1px 3px),
    linear-gradient(135deg,rgba(10,18,42,.9),rgba(15,28,64,.8));
  border:1px solid rgba(255,255,255,.09);border-radius:10px;
  position:relative;overflow:hidden}
.cam-live{position:absolute;top:6px;left:7px;display:flex;align-items:center;gap:4px;
  background:rgba(0,0,0,.55);border-radius:99px;padding:3px 7px}
.cam-live-dot{width:5px;height:5px;border-radius:50%;background:var(--red);
  animation:livePulse 1.6s ease-in-out infinite}
.cam-live-text{font-size:9px;font-weight:800;letter-spacing:1px;color:#fff}
.cam-name{position:absolute;bottom:5px;left:7px;font-size:10px;font-weight:700;
  color:rgba(255,255,255,.7);letter-spacing:.5px}
.cam-icon{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);opacity:.18}

/* Garage doors */
.garage-row{display:flex;gap:7px;flex-shrink:0;height:72px}
.garage-card{flex:1;padding:7px 11px;border-radius:12px;display:flex;flex-direction:column;gap:4px}
.garage-top{display:flex;align-items:center;justify-content:space-between}
.garage-name{font-size:11px;font-weight:700;color:var(--tp)}
.garage-status{font-size:10px;font-weight:600;margin-top:2px}
.garage-status.open{color:var(--red)}
.garage-status.closed{color:var(--teal)}
.garage-btns{display:flex;gap:4px}
.garage-btn{flex:1;padding:4px 0;border-radius:7px;font-size:11px;font-weight:700;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.06);color:var(--tm);transition:all .15s}
.garage-btn.open-active{border-color:rgba(255,93,108,.4);background:rgba(255,93,108,.18);color:var(--red2)}
.garage-btn.close-active{border-color:rgba(45,212,191,.4);background:rgba(45,212,191,.12);color:var(--teal2)}

/* Battery card */
.battery-card{padding:18px 16px;border-radius:16px;display:flex;flex-direction:column;gap:12px;flex:1;min-height:0}
.battery-row{display:flex;align-items:center;justify-content:space-between}
.battery-val{font-size:12px;color:var(--teal);font-weight:700}
.battery-bar-bg{height:6px;background:rgba(255,255,255,.1);border-radius:4px;overflow:hidden}
.battery-bar-fill{height:100%;background:linear-gradient(90deg,var(--teal),var(--teal2));border-radius:4px;transition:width .5s ease}

/* Alarm card (right column) */
.ha-alarm-card{border-radius:16px;padding:12px 16px;display:flex;flex-direction:column;gap:10px;flex-shrink:0}
.ha-alarm-top{display:flex;align-items:center;gap:11px}
.ha-alarm-icon{width:34px;height:34px;border-radius:10px;flex-shrink:0;display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12)}
.ha-alarm-sub{font-size:12px;color:#8ea0cc;margin-top:2px}
.ha-alarm-badge{font-size:11px;font-weight:700;color:#8ea0cc;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);border-radius:99px;padding:4px 12px;flex-shrink:0}
.ha-alarm-divider{height:1px;background:rgba(255,255,255,.09)}
.ha-alarm-pirs{display:flex;align-items:center;gap:16px}
.ha-pir{display:flex;align-items:center;gap:7px}
.ha-pir-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.ha-pir-name{font-size:12px;color:#cdd6ee}

/* Scene bar */
.scene-bar{display:flex;gap:7px;height:66px;flex-shrink:0;margin-top:9px}
.scene-btn{flex:1;border-radius:13px;border:1px solid rgba(255,255,255,.11);
  background:rgba(255,255,255,.06);color:var(--tm);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:4px;transition:all .2s;font-size:10px;font-weight:700;letter-spacing:.5px}
.scene-btn svg{width:15px;height:15px;fill:none;stroke:currentColor;stroke-width:2}

/* ============ ROOMS TAB ============ */
.tab-title{font-family:'Space Grotesk',sans-serif;font-size:30px;font-weight:600;color:var(--tp)}
.tab-sub{font-size:12px;color:var(--tm);margin-top:2px}
.rooms-grid{display:grid;grid-template-columns:repeat(4,1fr);grid-template-rows:repeat(2,1fr);gap:8px;flex:1;min-height:0;margin-top:8px}
.room-card{border-radius:14px;padding:11px 12px 10px;display:flex;flex-direction:column;gap:7px;
  transition:all .2s;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.05)}
.room-card.on{border-color:rgba(255,255,255,.25)}
.room-top{display:flex;align-items:center;gap:8px}
.room-icon-wrap{width:34px;height:34px;border-radius:10px;flex-shrink:0;
  display:flex;align-items:center;justify-content:center}
.room-icon-wrap svg{width:18px;height:18px;fill:none;stroke:currentColor;stroke-width:2}
.room-name{font-size:13px;font-weight:700;color:var(--tp);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.room-devices{font-size:10px;color:var(--td);margin-top:1px}
.room-temp{font-family:'Space Grotesk',sans-serif;font-size:18px;font-weight:600;color:var(--sky);flex-shrink:0;margin-left:auto}
.room-light-row{display:flex;align-items:center;justify-content:space-between}
.room-light-label{font-size:11px;color:var(--tm);font-weight:600}

/* ============ SECURITY TAB ============ */
.security-body{display:flex;gap:12px;flex:1;min-height:0;margin-top:11px}
.big-cam-grid{display:grid;grid-template-columns:repeat(2,1fr);grid-template-rows:repeat(2,1fr);gap:8px;flex:1.5;min-height:0}
.big-cam-tile{background:repeating-linear-gradient(0deg,rgba(255,255,255,.025) 0 1px,transparent 1px 3px),
    linear-gradient(135deg,rgba(10,18,42,.9),rgba(15,28,64,.85));
  border:1px solid rgba(255,255,255,.09);border-radius:14px;position:relative;overflow:hidden}
.big-cam-live{position:absolute;top:9px;left:10px;display:flex;align-items:center;gap:5px;
  background:rgba(0,0,0,.55);border-radius:99px;padding:4px 9px}
.big-cam-dot{width:6px;height:6px;border-radius:50%;background:var(--red);animation:livePulse 1.6s ease-in-out infinite}
.big-cam-live-text{font-size:10px;font-weight:800;letter-spacing:1px;color:#fff}
.big-cam-name{position:absolute;bottom:8px;left:10px;font-size:12px;font-weight:700;
  color:rgba(255,255,255,.8);letter-spacing:.5px}
.big-cam-icon{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);opacity:.15}
.sec-right{flex:1;display:flex;flex-direction:column;gap:9px}
.sec-garage-row{display:flex;gap:8px}
.sec-garage-card{flex:1;padding:12px 13px;border-radius:14px;display:flex;flex-direction:column;gap:7px;cursor:pointer}
.sec-garage-name{font-size:13px;font-weight:700;color:var(--tp)}
.sec-garage-status{font-size:13px;font-weight:600}
.sec-garage-hint{font-size:11px;color:var(--td)}
.motion-card{padding:12px 13px;border-radius:14px;display:flex;flex-direction:column;gap:8px;flex:1}
.motion-row{display:flex;align-items:center;gap:9px}
.motion-icon-wrap{width:34px;height:34px;border-radius:10px;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;transition:all .2s}
.motion-icon-wrap svg{width:15px;height:15px;fill:none;stroke:currentColor;stroke-width:2}
.motion-name{font-size:13px;font-weight:600;color:var(--tp)}
.motion-status{font-size:11px;margin-top:2px}
.motion-status.active{color:var(--amber)}
.motion-status.clear{color:var(--td)}
.motion-status-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;margin-left:auto;transition:all .2s}
.motion-status-dot.active{background:var(--amber);box-shadow:0 0 12px rgba(255,174,61,.7);animation:glowAmber 1.4s ease-in-out infinite}
.motion-status-dot.clear{background:var(--teal);box-shadow:0 0 6px rgba(45,212,191,.5)}
.alarm-stub{padding:12px 13px;border-radius:14px;flex-shrink:0}
.alarm-stub-title{font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--tm);margin-bottom:6px}
.alarm-stub-body{font-size:12px;color:var(--td);line-height:1.5}

/* ============ ENERGY TAB ============ */
.energy-body{display:flex;gap:13px;flex:1;min-height:0;margin-top:11px}
.flow-panel{flex:1.3;border-radius:18px;padding:14px;display:flex;align-items:center;justify-content:center;position:relative}
.flow-pending{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;
  justify-content:center;gap:8px;border-radius:18px;
  background:rgba(10,19,48,.6);backdrop-filter:blur(4px);z-index:2}
.flow-pending-icon svg{width:32px;height:32px;fill:none;stroke:var(--amber);stroke-width:1.5}
.flow-pending-title{font-size:14px;font-weight:600;color:var(--tm)}
.flow-pending-body{font-size:11px;color:var(--td);text-align:center;max-width:200px;line-height:1.5}
.energy-right{flex:1;display:flex;flex-direction:column;gap:10px}
.solar-card{flex:1.4;border-radius:16px;padding:15px 17px;display:flex;flex-direction:column;gap:5px;justify-content:center}
.solar-val{font-family:'Space Grotesk',sans-serif;font-size:52px;font-weight:600;line-height:1}
.solar-unit{font-size:13px;color:var(--tm)}
.bat-energy-card{border-radius:14px;padding:11px 13px;display:flex;flex-direction:column;gap:7px}
.energy-small-row{display:flex;gap:9px}
.energy-small-card{flex:1;border-radius:14px;padding:11px 13px}
.energy-small-label{font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--tm);margin-bottom:5px}
.energy-small-val{font-family:'Space Grotesk',sans-serif;font-size:22px;font-weight:600}
.energy-small-unit{font-size:11px;color:var(--td);margin-top:2px}
</style>
</head>
<body>
<div id="app">
  <div id="loading">
    <div class="ldot"></div>
    <div class="ldot"></div>
    <div class="ldot"></div>
    <span style="margin-left:8px">Connecting to Home Assistant…</span>
  </div>
</div>

<script>
'use strict';

// ================================================================
// CONFIG — all entity IDs discovered from HA on 2026-06-21
// ================================================================
const C = {
  climate: {
    master:'climate.master', kitchen:'climate.kitchen', dining:'climate.dining',
    tv_room:'climate.tv_room', char:'climate.char', ella:'climate.ella',
    josh:'climate.josh', study:'climate.study'
  },
  lights: {
    lounge:'light.lounge_light_downlights', wall:'light.wall_lights',
    kitchen:'light.kitchen_light_downlights', kitchen_p:'light.kitchen_light_pendants',
    dining:'light.dining_lights',
    dining_down:'light.dining_light_downlights', dining_pendant:'light.dining_light_pendant',
    hallway:'light.hallway_light_downlights', piano:'light.hallway_light_piano_nook',
    tv_led:'light.tv_led_strip', tv_wall:'light.tv_wall_lights',

// ================================================================

// ================================================================
class HAWebSocket {
  constructor() {
    this.ws = null; this.msgId = 1; this.pending = new Map();
    this.listeners = new Map(); this.globalCbs = new Set();
    this.token = null; this.reconnTimer = null; this.ready = false;
    this.onReadyCbs = [];
  }
  connect(token) { this.token = token; this._connect(); }
  onReady(cb) { this.ready ? cb() : this.onReadyCbs.push(cb); }
  _connect() {
    clearTimeout(this.reconnTimer);
    const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
    this.ws = new WebSocket(`${proto}//${location.host}/api/websocket`);
    this.ws.onmessage = e => this._msg(JSON.parse(e.data));
    this.ws.onerror = () => {};
    this.ws.onclose = () => { this.reconnTimer = setTimeout(() => this._connect(), 4000); };
  }
  _send(obj) { this.ws.readyState === 1 && this.ws.send(JSON.stringify(obj)); }
  _cmd(obj) {
    const id = this.msgId++;
    return new Promise(res => { this.pending.set(id, res); this._send({id, ...obj}); });
  }
  _msg(m) {
    if (m.type === 'auth_required') this._send({type:'auth', access_token:this.token});
    else if (m.type === 'auth_ok') this._init();
    else if (m.type === 'result') { const r = this.pending.get(m.id); r && (r(m), this.pending.delete(m.id)); }
    else if (m.type === 'event' && m.event?.event_type === 'state_changed') {
      const {entity_id, new_state} = m.event.data;
      if (new_state) { state.entities.set(entity_id, new_state); this._notify(entity_id, new_state); }
    }
  }
  async _init() {
    const r = await this._cmd({type:'get_states'});
    r.result?.forEach(s => state.entities.set(s.entity_id, s));
    this._send({id:this.msgId++, type:'subscribe_events', event_type:'state_changed'});
    this.ready = true; this.onReadyCbs.forEach(cb => cb()); this.onReadyCbs = [];
  }
  _notify(id, s) {
    this.listeners.get(id)?.forEach(cb => cb(s));
    this.globalCbs.forEach(cb => cb(id, s));
  }
  sub(id, cb) { if (!this.listeners.has(id)) this.listeners.set(id, new Set()); this.listeners.get(id).add(cb); return () => this.listeners.get(id).delete(cb); }
  subAll(cb) { this.globalCbs.add(cb); return () => this.globalCbs.delete(cb); }
  callSvc(domain, svc, data={}, target=null) {
    const msg = {type:'call_service', domain, service:svc, service_data:data};
    if (target) msg.target = target;
    return this._cmd(msg);
  }
  st(id) { return state.entities.get(id); }
  val(id) { return state.entities.get(id)?.state ?? 'unknown'; }
  attr(id, a) { return state.entities.get(id)?.attributes?.[a]; }
  on(id) { const s = this.val(id); return s !== 'off' && s !== 'unavailable' && s !== 'unknown'; }
  turnOn(id, d={}) { return this.callSvc(id.split('.')[0],'turn_on',d,{entity_id:id}); }
  turnOff(id, d={}) { return this.callSvc(id.split('.')[0],'turn_off',d,{entity_id:id}); }
  scene(id) { return this.callSvc('scene','turn_on',{},{entity_id:id}); }
  hvacMode(id, mode) { return this.callSvc('climate','set_hvac_mode',{hvac_mode:mode},{entity_id:id}); }
  setTemp(id, t) { return this.callSvc('climate','set_temperature',{temperature:t},{entity_id:id}); }
  openCover(id) { return this.callSvc('cover','open_cover',{},{entity_id:id}); }
  closeCover(id) { return this.callSvc('cover','close_cover',{},{entity_id:id}); }
}

let clockTick;
function startClock() {
  clearInterval(clockTick);
  function update() {
    const n = new Date();
    const h = n.getHours(), m = n.getMinutes(), s = n.getSeconds();
    const ampm = h >= 12 ? 'PM' : 'AM';
    const h12 = (h % 12 || 12);
    const mp = String(m).padStart(2,'0'), sp = String(s).padStart(2,'0');
    const days = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
    const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    const dateStr = `${days[n.getDay()]}, ${n.getDate()} ${months[n.getMonth()]}`;
    const el = document.getElementById('clock-time');
    if (el) el.innerHTML = `<span class="clock-time">${h12}:${mp}<span style="display:inline-flex;flex-direction:column;font-size:14px;padding-bottom:6px;margin-left:6px;vertical-align:bottom"><span class="clock-ampm">${ampm}</span><span class="clock-sec">${sp}s</span></span></span><div class="clock-date">${dateStr}</div>`;
  }
  update(); clockTick = setInterval(update, 1000);
}

// ================================================================
// ENERGY TAB
// ================================================================
function renderEnergy() {
  const solar  = C.energy.solar_power  ? parseFloat(ha.val(C.energy.solar_power))  : null;
  const soc    = C.energy.battery_soc  ? parseFloat(ha.val(C.energy.battery_soc))  : null;
  const batKW  = C.energy.battery_power? parseFloat(ha.val(C.energy.battery_power)): null;
  const grid   = C.energy.grid_power   ? parseFloat(ha.val(C.energy.grid_power))   : null;
  const yToday = C.energy.yield_today  ? parseFloat(ha.val(C.energy.yield_today))  : null;
  const home   = solar!==null ? Math.max(0,(solar??0)-(batKW??0)-(grid??0)) : null;
  const pending = solar === null;

  // SVG flow diagram
  function node(x,y,label,val,unit,color) {
    return `<g transform="translate(${x},${y})">
      <rect x="-50" y="-33" width="100" height="68" rx="11" fill="rgba(255,255,255,.06)" stroke="${color}55" stroke-width="1"/>
      <text x="0" y="-10" text-anchor="middle" fill="var(--tm)" font-size="9.5" font-weight="700" letter-spacing="1" font-family="Manrope,sans-serif">${label}</text>
      <text x="0" y="16" text-anchor="middle" fill="${color}" font-size="20" font-weight="700" font-family="'Space Grotesk',sans-serif">${pending?'—':val}</text>
      <text x="0" y="31" text-anchor="middle" fill="var(--td)" font-size="10" font-family="Manrope,sans-serif">${unit}</text>
    </g>`;
  }
  function flowLine(x1,y1,x2,y2,active,color) {
    return `<line x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}"
      stroke="${active?color:'rgba(255,255,255,.1)'}" stroke-width="2"
      stroke-dasharray="8 4" stroke-linecap="round"
      style="${active?'animation:flowDash 1.2s linear infinite':''}"/>`;
  }

  const solarVal  = solar!==null  ? solar.toFixed(1)  : '0.0';
  const socVal    = soc!==null    ? Math.round(soc)+'%': '—';
  const gridVal   = grid!==null   ? (grid>0?'+':'')+grid.toFixed(1) : '—';
  const homeVal   = home!==null   ? home.toFixed(1)   : '—';

  return `
    <div style="flex-shrink:0">
      <div class="tab-title">Energy</div>
      <div class="tab-sub">Live power flow</div>
    </div>
    <div class="energy-body">
      <div class="flow-panel glass">
        ${pending?`<div class="flow-pending">
          <div class="flow-pending-icon">${I.bolt.replace('<svg','<svg width="32" height="32" fill="none" stroke="var(--amber)" stroke-width="1.5"')}</div>
          <div class="flow-pending-title">Sigenergy not yet connected</div>
          <div class="flow-pending-body">Install the Sigenergy integration in HA and add the inverter IP to see live power flow.</div>
        </div>`:''}
        <svg width="100%" height="100%" viewBox="0 0 270 270" style="overflow:visible">
          ${flowLine(135,65,135,195,!pending&&solar>0,'#2dd4bf')}
          ${flowLine(75,148,125,203,!pending&&batKW<0,'#7c83ff')}
          ${flowLine(195,148,145,203,!pending&&grid>0,'#ffae3d')}
          ${node(135,47,'SOLAR',solarVal,'kW','#ffae3d')}
          ${node(57,148,'BATTERY',socVal,'','#7c83ff')}
          ${node(213,148,'GRID',gridVal,'kW','#9fb0d8')}
          ${node(135,220,'HOME',homeVal,'kW','#38e0ff')}
        </svg>
      </div>
      <div class="energy-right">
        <div class="solar-card" style="${pending?'background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.1)':'background:linear-gradient(135deg,rgba(45,212,191,.18),rgba(56,224,255,.08));border:1px solid rgba(56,224,255,.28)'}">
          <div class="label-caps">Solar Generation</div>
          <div class="solar-val" style="color:${pending?'var(--td)':'var(--teal)'}">${pending?'—':solarVal}</div>
          <div class="solar-unit">kW live</div>
        </div>
        <div class="bat-energy-card glass">
          <div style="display:flex;align-items:center;justify-content:space-between">
            <span class="label-caps">Battery</span>
            <span style="font-size:12px;font-weight:700;color:#7c83ff">${soc!==null?Math.round(soc)+'%':'—'}${batKW!==null?' · '+(batKW>0?'+':'')+batKW.toFixed(1)+' kW':''}</span>
          </div>
          <div class="battery-bar-bg"><div class="battery-bar-fill" style="background:linear-gradient(90deg,#7c83ff,#a78bfa);width:${soc??0}%"></div></div>
        </div>
        <div class="energy-small-row">
          <div class="energy-small-card glass">
            <div class="energy-small-label">Grid Export</div>
            <div class="energy-small-val" style="color:${grid!==null&&grid<0?'var(--teal)':'var(--tm)'}">${grid!==null?Math.abs(grid).toFixed(1):'—'}</div>
            <div class="energy-small-unit">kW</div>
          </div>
          <div class="energy-small-card glass">
            <div class="energy-small-label">Yield Today</div>
            <div class="energy-small-val" style="color:${yToday!==null?'var(--amber)':'var(--tm)'}">${yToday!==null?yToday.toFixed(1):'—'}</div>
            <div class="energy-small-unit">kWh</div>
          </div>
        </div>
      </div>
    </div>`;
}

// ================================================================
// MAIN RENDER
// ================================================================
function render() {
  const app = document.getElementById('app');
  const tabContent = {home:renderHome, rooms:renderRooms, security:renderSecurity, energy:renderEnergy}[state.tab]?.() ?? '';
  app.innerHTML = `
    <div id="content">${tabContent}</div>
    <nav id="nav">${renderNav()}</nav>`;
  if (state.tab === 'home') startClock();
  bindEvents();
}

function rerender() {
  // Lightweight re-render: only update dynamic bits where possible
  // For simplicity, full re-render (fast enough at 1024×600)
  render();
}

// ================================================================
// EVENT BINDING
// ================================================================
function bindEvents() {
  const app = document.getElementById('app');

  // Nav tabs
  app.querySelectorAll('[data-tab]').forEach(btn => {
    btn.addEventListener('click', () => { state.tab = btn.dataset.tab; render(); });
  });

  // Zones toggle
  const zt = document.getElementById('zones-toggle');
  if (zt) zt.addEventListener('click', () => { state.zonesExpanded = !state.zonesExpanded; rerender(); });

  // Zone power toggle
  app.querySelectorAll('[data-zone-toggle]').forEach(btn => {
    btn.addEventListener('click', e => {
      e.stopPropagation();
      const id = btn.dataset.zoneToggle;
      ha.on(id) ? ha.turnOff(id) : ha.turnOn(id);
    });
  });

  // Zone temp buttons
  app.querySelectorAll('[data-zone-temp]').forEach(btn => {
    btn.addEventListener('click', e => {
      e.stopPropagation();
      const id = btn.dataset.zoneTemp;
      const delta = parseInt(btn.dataset.delta);
      const cur = ha.attr(id,'temperature') ?? 22;
      ha.setTemp(id, Math.min(30, Math.max(16, cur + delta)));
    });
  });

  // Garage
  const chOpen = document.getElementById('ch-open');
  const chClose = document.getElementById('ch-close');
  if (chOpen) chOpen.addEventListener('click', () => ha.openCover(C.garage_chermside));
  if (chClose) chClose.addEventListener('click', () => ha.closeCover(C.garage_chermside));

  // Security tab garage
  const secCh = document.getElementById('sec-ch');
  if (secCh) secCh.addEventListener('click', () => {
    const open = ha.val(C.garage_chermside) === 'open' || ha.val(C.garage_chermside) === 'opening';
    open ? ha.closeCover(C.garage_chermside) : ha.openCover(C.garage_chermside);
  });

  // Alarm toggle
  const alarmToggle = document.getElementById('alarm-toggle');
  const alarmCard   = document.getElementById('alarm-card');
  const toggleAlarm = () => {
    if (!C.alarm) { state.alarmArmed = !state.alarmArmed; rerender(); return; }
    state.alarmArmed
      ? ha.callSvc('alarm_control_panel','alarm_disarm',{},{entity_id:C.alarm})
      : ha.callSvc('alarm_control_panel','alarm_arm_away',{},{entity_id:C.alarm});
  };
  if (alarmToggle) alarmToggle.addEventListener('click', e => { e.stopPropagation(); toggleAlarm(); });
  if (alarmCard) alarmCard.addEventListener('click', toggleAlarm);

  // Scenes (one-shot action buttons, no active state)
  app.querySelectorAll('[data-scene]').forEach(btn => {
    btn.addEventListener('click', () => {
      ha.scene(btn.dataset.sceneEntity);
    });
  });

  // Room light switches
  app.querySelectorAll('[data-room]').forEach(btn => {
    btn.addEventListener('click', e => {
      e.stopPropagation();
      const lights = JSON.parse(btn.dataset.roomLights);
      const on = btn.dataset.roomOn === 'true';
      lights.forEach(l => on ? ha.turnOff(l) : ha.turnOn(l));
    });
  });
}

// ================================================================
// AUTH + INIT
// ================================================================
function getToken() {
  const hash   = new URLSearchParams(location.hash.replace('#',''));
  const search = new URLSearchParams(location.search);
  const fromUrl = hash.get('token') || search.get('token');
  if (fromUrl) { sessionStorage.setItem('ha_token', fromUrl); return fromUrl; }
  const cached = sessionStorage.getItem('ha_token');
  if (cached) return cached;
  const entered = prompt('Enter your Home Assistant long-lived access token:');
  if (entered) sessionStorage.setItem('ha_token', entered);
  return entered;
}

const token = getToken();
if (!token) {
  document.getElementById('app').innerHTML = `
    <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:12px;color:var(--tm);font-size:14px">
      <div>No token provided.</div>
      <div style="font-size:12px">Reload with <code style="color:var(--cyan)">?token=YOUR_TOKEN</code> in the URL.</div>
    </div>`;
} else {
  ha.connect(token);
  ha.onReady(() => {
    // Re-render on any entity change (throttled)
    let rerenderScheduled = false;
    ha.subAll(() => {
      if (!rerenderScheduled) {
        rerenderScheduled = true;
        requestAnimationFrame(() => { rerenderScheduled = false; rerender(); });
      }
    });
    render();
  });
}
</script>
